[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pillow", "python311Packages.numpy"]

[build.nixpacksPlan.phases.install]
cmds = [
  "npm install",
  "python3.11 -c 'import PIL, numpy; print(\"Python deps OK\")' || echo 'Python deps missing but continuing'"
]

[deploy]
startCommand = "node server/index.js"
restartPolicyType = "on_failure"

[build]
builder = "nixpacks"
buildCommand = "npm install && python3 -m pip install opencv-python-headless Pillow numpy --break-system-packages || python3 -m pip install Pillow numpy --break-system-packages || pip3 install Pillow numpy --break-system-packages || true"

[deploy]
startCommand = "node server/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

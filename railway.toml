[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[build.nixpacksPlan.phases.install]
cmds = [
  "npm install",
  "python3.11 -m pip install opencv-python-headless Pillow numpy --break-system-packages || python3.11 -m pip install Pillow numpy --break-system-packages"
]

[deploy]
startCommand = "node server/index.js"
restartPolicyType = "on_failure"

<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>AVRA — Editor pôdorysu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1c2030;--b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--a:#2ecc9a;--t:#e8eaf0;--t2:#8b90a0;--t3:#454a5a;--r:danger-color:#e05555}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Topbar */
#tb{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;flex-wrap:wrap}
.logo{width:26px;height:26px;background:var(--a);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:12px;flex-shrink:0}
#pname{background:var(--bg3);border:1px solid var(--b2);border-radius:7px;color:var(--t);padding:5px 10px;font-family:inherit;font-size:14px;width:200px;outline:none}
#pname:focus{border-color:var(--a)}
.sep{width:1px;height:22px;background:var(--b);flex-shrink:0}
.tbtn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s;white-space:nowrap}
.tbtn:hover{background:var(--bg3);color:var(--t)}
.tbtn.active{background:rgba(46,204,154,.12);border-color:rgba(46,204,154,.4);color:var(--a)}
.tbtn.danger{border-color:rgba(224,85,85,.3);color:#e05555}
.tbtn.danger:hover{background:rgba(224,85,85,.1)}
.sp{flex:1}
#save-btn{background:var(--a);color:#000;border:none;border-radius:7px;padding:7px 16px;font-weight:600;font-family:inherit;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
#save-btn:disabled{opacity:.4;cursor:not-allowed}
#status{font-size:11px;color:var(--t3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Layout */
#main{display:grid;grid-template-columns:1fr 280px;flex:1;overflow:hidden;min-height:0}

/* Canvas */
#ca{position:relative;overflow:hidden;background:#1a1e28;cursor:crosshair}
#ca.pan{cursor:grab}
#ca.panning{cursor:grabbing}
#tc{width:100%;height:100%;display:block}

/* Float tools */
#ft{position:absolute;left:10px;top:10px;display:flex;flex-direction:column;gap:5px}
.ftb{width:34px;height:34px;border-radius:7px;background:var(--bg2);border:1px solid var(--b2);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s}
.ftb:hover{background:var(--bg3);color:var(--t)}
.ftb.active{background:rgba(46,204,154,.15);border-color:rgba(46,204,154,.4);color:var(--a)}
.ftb-sep{height:1px;background:var(--b);margin:2px 0}

#zoom-lbl{position:absolute;bottom:10px;left:10px;font-size:10px;color:var(--t3);background:var(--bg2);border:1px solid var(--b);border-radius:5px;padding:3px 8px}
#instr{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--t2);background:rgba(13,15,20,.9);backdrop-filter:blur(6px);border:1px solid var(--b2);border-radius:99px;padding:5px 14px;white-space:nowrap;pointer-events:none;transition:opacity .3s}
#autobar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--b2);border-radius:9px;padding:8px 14px;display:none;align-items:center;gap:8px;font-size:12px;z-index:10}
.spin{width:13px;height:13px;border:2px solid rgba(46,204,154,.3);border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Right panel */
#panel{background:var(--bg2);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;min-height:0}
#prev3d{flex:1;background:#080a10;position:relative;min-height:0}
#pc{width:100%;height:100%;display:block}
#prev-lbl{position:absolute;top:7px;left:9px;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;pointer-events:none}

#roomlist{padding:10px;border-top:1px solid var(--b);overflow-y:auto;max-height:200px}
.rl-title{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.ri{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;margin-bottom:2px;cursor:pointer}
.ri:hover{background:var(--bg3)}
.ri.sel{background:rgba(46,204,154,.08)}
.rcolor{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rni{background:transparent;border:none;color:var(--t);font-family:inherit;font-size:12px;width:100%;outline:none;padding:0;cursor:pointer}
.rni:focus{color:var(--a);cursor:text}
.rarea{font-size:10px;color:var(--t3)}
.rdel{width:20px;height:20px;border-radius:4px;background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.rdel:hover{background:rgba(224,85,85,.15);color:#e05555}

#meta{padding:10px;border-top:1px solid var(--b)}
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.meta-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mi{background:var(--bg3);border:1px solid var(--b2);border-radius:6px;color:var(--t);padding:5px 9px;font-family:inherit;font-size:12px;outline:none;width:100%}
.mi:focus{border-color:var(--a)}
</style>
</head>
<body>

<div id="tb">
  <div class="logo">A</div>
  <input id="pname" type="text" placeholder="Názov nehnuteľnosti…">
  <div class="sep"></div>
  <button class="tbtn active" id="tb-draw" onclick="setTool('draw')">✏ Kresliť</button>
  <button class="tbtn" id="tb-sel" onclick="setTool('select')">↖ Vybrať</button>
  <button class="tbtn" id="tb-pan" onclick="setTool('pan')">✋ Pan</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="triggerUpload()" title="Nahrať pôdorys ako pozadie">📐 Pôdorys</button>
  <button class="tbtn" id="tb-auto" onclick="runAutoDetect()">🔍 Auto-detekcia</button>
  <button class="tbtn danger" onclick="clearAll()">🗑</button>
  <div class="sp"></div>
  <span id="status"></span>
  <button id="save-btn" onclick="saveProperty()">💾 Uložiť & QR</button>
</div>

<div id="main">
  <div id="ca">
    <canvas id="tc"></canvas>
    <div id="ft">
      <div class="ftb active" id="ft-draw" onclick="setTool('draw')" title="Kresliť (D)">✏</div>
      <div class="ftb" id="ft-sel" onclick="setTool('select')" title="Vybrať (S)">↖</div>
      <div class="ftb" id="ft-pan" onclick="setTool('pan')" title="Posúvať (P)">✋</div>
      <div class="ftb-sep"></div>
      <div class="ftb" onclick="zoomIn()" title="Priblížiť (+)">+</div>
      <div class="ftb" onclick="zoomOut()" title="Oddialiť (-)">−</div>
      <div class="ftb" onclick="resetView()" title="Reset (R)">⊙</div>
      <div class="ftb-sep"></div>
      <div class="ftb" onclick="undo()" title="Späť (Ctrl+Z)">↩</div>
      <div class="ftb" onclick="closeRoom()" title="Uzavrieť miestnosť (Enter)" style="font-size:11px">✓</div>
    </div>
    <div id="zoom-lbl">100%</div>
    <div id="instr">Kliknite pre bod · Enter alebo ✓ pre uzavretie miestnosti</div>
    <div id="autobar"><div class="spin"></div><span id="auto-msg">Analyzujem…</span></div>
  </div>

  <div id="panel">
    <div id="prev3d">
      <canvas id="pc"></canvas>
      <div id="prev-lbl">Live 3D náhľad</div>
    </div>
    <div id="roomlist">
      <div class="rl-title">
        <span>Miestnosti</span>
        <span id="room-count" style="color:var(--a);font-size:10px">0</span>
      </div>
      <div id="ri-container"></div>
    </div>
    <div id="meta">
      <div class="meta-row">
        <div><div class="meta-lbl">Rozloha m²</div><input class="mi" id="m-area" type="number" placeholder="78"></div>
        <div><div class="meta-lbl">Cena €</div><input class="mi" id="m-price" placeholder="189 000"></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg" style="display:none" onchange="onFileSelected(this)">

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API = location.origin;
function getIdFromPath(){
  const p=location.pathname.split('/').filter(Boolean);
  return p.length>=2&&p[0]==='editor'?p[1]:null;
}
let propId = getIdFromPath();

// ── State ─────────────────────────────────────────────────────────────────────
let tool='draw';
let rooms=[];         // {id,name,pts:[{x,y}],closed,color}
let curPts=[];        // points being drawn
let selRoom=null;
let bgImg=null;
let roomIdx=0;

let vx=0,vy=0,vs=1;  // viewport: offset x,y + scale
let isPan=false,panSX=0,panSY=0,panVX=0,panVY=0;
let mx=0,my=0;        // mouse in screen coords

const NAMES=['Obývacia izba','Kuchyňa','Spálňa','Detská izba','Kúpeľňa','Chodba','Pracovňa','Jedáleň','WC','Šatník','Terasa','Balkón'];
const COLORS=['#5b9bd5','#4caf7d','#e0a835','#a07dd0','#2ecc9a','#e07070','#70b0e0','#9bd570','#d570b0','#70d5c8'];

// ── Canvas setup ──────────────────────────────────────────────────────────────
const tc=document.getElementById('tc');
const ctx=tc.getContext('2d');

function resizeCanvas(){
  const a=document.getElementById('ca');
  tc.width=a.clientWidth; tc.height=a.clientHeight;
  draw();
}
new ResizeObserver(resizeCanvas).observe(document.getElementById('ca'));

// ── Coordinate transforms ─────────────────────────────────────────────────────
const w2s=(x,y)=>({x:x*vs+vx, y:y*vs+vy});
const s2w=(x,y)=>({x:(x-vx)/vs, y:(y-vy)/vs});

// ── Drawing ───────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,tc.width,tc.height);
  drawGrid();
  if(bgImg){
    ctx.globalAlpha=0.3;
    ctx.drawImage(bgImg,vx,vy,bgImg.width*vs,bgImg.height*vs);
    ctx.globalAlpha=1;
  }
  rooms.forEach(r=>drawRoom(r,r===selRoom));
  if(curPts.length&&tool==='draw') drawCurrentPath();
  document.getElementById('zoom-lbl').textContent=Math.round(vs*100)+'%';
}

function drawGrid(){
  const gs=50*vs; if(gs<8)return;
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.5;
  ctx.beginPath();
  for(let x=((vx%gs)+gs)%gs;x<tc.width;x+=gs){ctx.moveTo(x,0);ctx.lineTo(x,tc.height);}
  for(let y=((vy%gs)+gs)%gs;y<tc.height;y+=gs){ctx.moveTo(0,y);ctx.lineTo(tc.width,y);}
  ctx.stroke();
}

function drawRoom(r,sel){
  if(r.pts.length<2)return;
  const p=r.pts.map(pt=>w2s(pt.x,pt.y));
  ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
  p.slice(1).forEach(pt=>ctx.lineTo(pt.x,pt.y));
  if(r.closed){
    ctx.closePath();
    ctx.fillStyle=r.color+'33';ctx.fill();
  }
  ctx.strokeStyle=sel?r.color:r.color+'aa';
  ctx.lineWidth=sel?2.5:1.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
  // Points
  p.forEach((pt,i)=>{
    ctx.beginPath();ctx.arc(pt.x,pt.y,sel?5:3.5,0,Math.PI*2);
    ctx.fillStyle=i===0?'#2ecc9a':r.color;ctx.fill();
    if(sel){ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();}
  });
  // Label
  if(r.closed){
    const cx=p.reduce((s,pt)=>s+pt.x,0)/p.length;
    const cy=p.reduce((s,pt)=>s+pt.y,0)/p.length;
    const fs=Math.max(10,12*vs);
    ctx.font=`${fs}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=r.color;ctx.fillText(r.name,cx,cy-7*vs);
    const a=roomArea(r.pts);
    if(a>0){ctx.font=`${Math.max(9,10*vs)}px system-ui`;ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText(a.toFixed(1)+' m²',cx,cy+6*vs);}
  }
}

function drawCurrentPath(){
  if(!curPts.length)return;
  const p=curPts.map(pt=>w2s(pt.x,pt.y));
  ctx.strokeStyle='#2ecc9a';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(p[0].x,p[0].y);
  p.slice(1).forEach(pt=>ctx.lineTo(pt.x,pt.y));
  ctx.lineTo(mx,my);ctx.stroke();ctx.setLineDash([]);
  p.forEach((pt,i)=>{
    ctx.beginPath();ctx.arc(pt.x,pt.y,i===0?6:4,0,Math.PI*2);
    ctx.fillStyle=i===0?'#2ecc9a':'#2ecc9a88';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  });
  // Snap ring on first point
  if(curPts.length>=3){
    const f=w2s(curPts[0].x,curPts[0].y);
    if(Math.hypot(mx-f.x,my-f.y)<20){
      ctx.beginPath();ctx.arc(f.x,f.y,14,0,Math.PI*2);
      ctx.strokeStyle='#2ecc9a';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
    }
  }
}

// ── Events ────────────────────────────────────────────────────────────────────
tc.addEventListener('mousemove',e=>{
  const r=tc.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;
  if(isPan){vx=panVX+(e.clientX-panSX);vy=panVY+(e.clientY-panSY);}
  draw();
});

tc.addEventListener('mousedown',e=>{
  const r=tc.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;
  if(tool==='pan'||e.button===1){
    isPan=true;panSX=e.clientX;panSY=e.clientY;panVX=vx;panVY=vy;
    document.getElementById('ca').classList.add('panning');return;
  }
  if(tool==='draw'&&e.button===0){
    const wp=s2w(mx,my);
    if(curPts.length>=3){
      const f=w2s(curPts[0].x,curPts[0].y);
      if(Math.hypot(mx-f.x,my-f.y)<20){closeRoom();return;}
    }
    curPts.push(snap(wp));draw();
  }
  if(tool==='select'&&e.button===0){
    const wp=s2w(mx,my);
    selRoom=rooms.find(r=>r.closed&&ptInPoly(wp,r.pts))||null;
    renderRoomList();draw();
  }
});

tc.addEventListener('mouseup',()=>{isPan=false;document.getElementById('ca').classList.remove('panning');});
tc.addEventListener('dblclick',()=>{if(tool==='draw'&&curPts.length>=3)closeRoom();});
tc.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?.9:1.1;
  const r=tc.getBoundingClientRect();
  const x=e.clientX-r.left,y=e.clientY-r.top;
  vx=x-(x-vx)*f;vy=y-(y-vy)*f;
  vs=Math.max(.05,Math.min(15,vs*f));draw();
},{passive:false});

// Touch
let tStartX=0,tStartY=0,tPanX=0,tPanY=0,tDist=null;
tc.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const r=tc.getBoundingClientRect();
    tStartX=e.touches[0].clientX-r.left;tStartY=e.touches[0].clientY-r.top;
    tPanX=vx;tPanY=vy;mx=tStartX;my=tStartY;
  }
  if(e.touches.length===2) tDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});

tc.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const r=tc.getBoundingClientRect();
    mx=e.touches[0].clientX-r.left;my=e.touches[0].clientY-r.top;
    if(tool==='pan'){vx=tPanX+(mx-tStartX);vy=tPanY+(my-tStartY);}
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(tDist){const f=d/tDist;const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;vx=cx-(cx-vx)*f;vy=cy-(cy-vy)*f;vs=Math.max(.05,Math.min(15,vs*f));}
    tDist=d;
  }
  draw();
},{passive:false});

tc.addEventListener('touchend',e=>{
  e.preventDefault();tDist=null;
  if(tool==='draw'&&e.changedTouches.length===1){
    const wp=s2w(mx,my);
    if(curPts.length>=3){const f=w2s(curPts[0].x,curPts[0].y);if(Math.hypot(mx-f.x,my-f.y)<24){closeRoom();return;}}
    curPts.push(snap(wp));draw();
  }
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Enter')closeRoom();
  if(e.key==='Escape'){curPts=[];draw();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z')undo();
  if(e.key==='d')setTool('draw');
  if(e.key==='s')setTool('select');
  if(e.key==='p')setTool('pan');
  if(e.key==='+'||e.key==='=')zoomIn();
  if(e.key==='-')zoomOut();
  if(e.key==='r')resetView();
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function snap(p,g=10){return{x:Math.round(p.x/g)*g,y:Math.round(p.y/g)*g};}

function ptInPoly(pt,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>pt.y)!==(yj>pt.y))&&(pt.x<(xj-xi)*(pt.y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}

function roomArea(pts){
  // Shoelace → m² (1px = 0.05m)
  let a=0;
  for(let i=0;i<pts.length;i++){const j=(i+1)%pts.length;a+=pts[i].x*pts[j].y-pts[j].x*pts[i].y;}
  return Math.abs(a)/2*0.0025;
}

// ── Room operations ───────────────────────────────────────────────────────────
function closeRoom(){
  if(curPts.length<3){setStatus('Potrebné aspoň 3 body');return;}
  const room={id:Date.now()+'',name:NAMES[roomIdx%NAMES.length],pts:[...curPts],closed:true,color:COLORS[roomIdx%COLORS.length]};
  rooms.push(room);roomIdx++;
  selRoom=room;curPts=[];
  renderRoomList();update3D();draw();
}
window.closeRoom=closeRoom;

function deleteRoom(i){
  if(rooms[i]===selRoom)selRoom=null;
  rooms.splice(i,1);renderRoomList();update3D();draw();
}

// ── Tools ─────────────────────────────────────────────────────────────────────
function setTool(t){
  tool=t;curPts=[];
  ['draw','sel','pan'].forEach(x=>{
    document.getElementById('tb-'+x)?.classList.toggle('active',x===t);
    document.getElementById('ft-'+x)?.classList.toggle('active',x===t);
  });
  document.getElementById('ca').className=t==='pan'?'pan':'';
  const hints={draw:'Kliknite pre bod · Enter alebo ✓ pre uzavretie · Escape pre zrušenie',select:'Kliknite na miestnosť',pan:'Ťahajte · Scroll pre zoom'};
  document.getElementById('instr').textContent=hints[t]||'';
  draw();
}
window.setTool=setTool;

function zoomIn(){vs=Math.min(15,vs*1.2);draw();}
function zoomOut(){vs=Math.max(.05,vs/1.2);draw();}
function resetView(){vx=tc.width/2;vy=tc.height/2;vs=1;draw();}
function undo(){
  if(curPts.length>0){curPts.pop();draw();}
  else if(rooms.length>0){rooms.pop();roomIdx--;renderRoomList();update3D();draw();}
}
function clearAll(){
  if(!confirm('Vymazať všetky miestnosti?'))return;
  rooms=[];roomIdx=0;curPts=[];selRoom=null;renderRoomList();update3D();draw();
}
window.zoomIn=zoomIn;window.zoomOut=zoomOut;window.resetView=resetView;window.undo=undo;window.clearAll=clearAll;

// ── Floor plan upload ─────────────────────────────────────────────────────────
function triggerUpload(){document.getElementById('file-input').click();}
window.triggerUpload=triggerUpload;

function onFileSelected(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      bgImg=img;
      const sx=tc.width*.85/img.width,sy=tc.height*.85/img.height;
      vs=Math.min(sx,sy);vx=(tc.width-img.width*vs)/2;vy=(tc.height-img.height*vs)/2;
      draw();
      // Auto-detect after upload
      runAutoDetectWithFile(file);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value='';
}
window.onFileSelected=onFileSelected;

// ── Auto-detection ────────────────────────────────────────────────────────────
async function runAutoDetect(){
  if(!bgImg){setStatus('Najprv nahrajte pôdorys (tlačidlo Pôdorys)');return;}
  // Convert canvas background to blob
  const c2=document.createElement('canvas');
  c2.width=bgImg.width;c2.height=bgImg.height;
  c2.getContext('2d').drawImage(bgImg,0,0);
  c2.toBlob(blob=>runAutoDetectWithFile(new File([blob],'fp.png',{type:'image/png'})),'image/png');
}
window.runAutoDetect=runAutoDetect;

async function runAutoDetectWithFile(file){
  showAutoBar('Analyzujem pôdorys…');
  try{
    const fd=new FormData();fd.append('image',file,file.name);
    const res=await fetch(API+'/api/parse-floorplan',{method:'POST',body:fd});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    hideAutoBar();
    if(data.rooms&&data.rooms.length>=1){
      applyDetectedRooms(data.rooms);
      setStatus(`✓ Detekovaných ${data.rooms.length} miestností — skontrolujte a dolaďte`);
    }else{
      setStatus(data.message||'Auto-detekcia nenašla miestnosti — nakreslite manuálne');
    }
  }catch(e){hideAutoBar();setStatus('Chyba auto-detekcie: '+e.message);}
}

function applyDetectedRooms(serverRooms){
  // Server rooms are in AR scale (0.035 * 20m)
  // Convert back to canvas coords: AR_units / (0.035/20) = canvas px
  const AR_TO_PX = 20 / 0.035; // ~571 px per real meter at scale 1

  rooms = serverRooms.map((r,i)=>{
    const cpx = r.x * AR_TO_PX;
    const cpz = r.z * AR_TO_PX;
    const cw  = r.w * AR_TO_PX;
    const cd  = r.d * AR_TO_PX;
    return {
      id: Date.now()+'_'+i,
      name: r.name||NAMES[i%NAMES.length],
      pts: [
        {x:cpx-cw/2,y:cpz-cd/2},{x:cpx+cw/2,y:cpz-cd/2},
        {x:cpx+cw/2,y:cpz+cd/2},{x:cpx-cw/2,y:cpz+cd/2}
      ],
      closed: true,
      color: COLORS[i%COLORS.length]
    };
  });
  roomIdx=rooms.length;

  // Center view on rooms
  if(rooms.length>0){
    const allX=rooms.flatMap(r=>r.pts.map(p=>p.x));
    const allY=rooms.flatMap(r=>r.pts.map(p=>p.y));
    const cx=(Math.min(...allX)+Math.max(...allX))/2;
    const cy=(Math.min(...allY)+Math.max(...allY))/2;
    vx=tc.width/2-cx*vs;vy=tc.height/2-cy*vs;
  }

  renderRoomList();update3D();draw();
}

function showAutoBar(msg){document.getElementById('auto-msg').textContent=msg;document.getElementById('autobar').style.display='flex';}
function hideAutoBar(){document.getElementById('autobar').style.display='none';}
function setStatus(msg){document.getElementById('status').textContent=msg;document.getElementById('status').title=msg;}

// ── Room list ─────────────────────────────────────────────────────────────────
function renderRoomList(){
  document.getElementById('room-count').textContent=rooms.length;
  document.getElementById('ri-container').innerHTML=rooms.map((r,i)=>`
    <div class="ri ${r===selRoom?'sel':''}" onclick="selectRoom(${i})">
      <div class="rcolor" style="background:${r.color}"></div>
      <div class="rinfo">
        <input class="rni" value="${r.name}" onclick="event.stopPropagation()" 
               onchange="rooms[${i}].name=this.value;draw();update3D()">
        <div class="rarea">${roomArea(r.pts).toFixed(1)} m²${r.closed?'':' (otvorená)'}</div>
      </div>
      <button class="rdel" onclick="deleteRoom(${i});event.stopPropagation()">✕</button>
    </div>`).join('');
}

function selectRoom(i){selRoom=rooms[i];renderRoomList();draw();}

// ── Convert to AR format for saving ──────────────────────────────────────────
function roomsToAR(){
  // 1px = 0.05m (at scale 1), AR scale = 0.035
  const CANVAS_TO_AR = 0.05 * 0.035;
  return rooms.filter(r=>r.closed&&r.pts.length>=3).map(r=>{
    const xs=r.pts.map(p=>p.x),ys=r.pts.map(p=>p.y);
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const minY=Math.min(...ys),maxY=Math.max(...ys);
    const cx=(minX+maxX)/2*CANVAS_TO_AR - (tc.width/2)*CANVAS_TO_AR;
    const cz=(minY+maxY)/2*CANVAS_TO_AR - (tc.height/2)*CANVAS_TO_AR;
    const w=Math.max(0.01,(maxX-minX)*CANVAS_TO_AR);
    const d=Math.max(0.01,(maxY-minY)*CANVAS_TO_AR);
    return{name:r.name,label:'R'+(rooms.indexOf(r)+1),
      x:+cx.toFixed(4),z:+cz.toFixed(4),
      w:+w.toFixed(4),d:+d.toFixed(4),
      area:+roomArea(r.pts).toFixed(1)};
  });
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveProperty(){
  const name=document.getElementById('pname').value.trim();
  if(!name){alert('Zadajte názov nehnuteľnosti');return;}
  const arRooms=roomsToAR();
  if(!arRooms.length){alert('Nakreslite aspoň jednu uzavretú miestnosť (Enter alebo ✓ po nakreslení)');return;}

  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Ukladám…';

  try{
    const body={
      name,
      area:document.getElementById('m-area').value||'',
      price:document.getElementById('m-price').value||'',
      rooms:arRooms,
      source:'trace'
    };

    let res,data;
    if(propId){
      // Update existing
      res=await fetch(`${API}/api/properties/${propId}`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
    }else{
      // Create new
      res=await fetch(`${API}/api/properties`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
    }

    if(!res.ok){
      const err=await res.json().catch(()=>({error:'HTTP '+res.status}));
      throw new Error(err.error||'HTTP '+res.status);
    }
    data=await res.json();

    if(!propId&&data.id){
      propId=data.id;
      history.replaceState(null,'','/editor/'+propId);
    }

    btn.disabled=false;btn.innerHTML='✓ Uložené!';
    setTimeout(()=>{btn.innerHTML='💾 Uložiť & QR';},2500);
    setStatus(`Uložené · ${arRooms.length} miestností`);

    if(data.qrCode) showQRModal(data.qrCode,data.viewer_url||data.viewerUrl,data.id||propId);

  }catch(e){
    console.error('Save error:',e);
    setStatus('Chyba: '+e.message);
    btn.disabled=false;btn.innerHTML='💾 Uložiť & QR';
    alert('Chyba pri ukladaní: '+e.message);
  }
}
window.saveProperty=saveProperty;

  d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  d.innerHTML=`<div style="background:#13161e;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:28px;max-width:360px;width:100%;text-align:center">
    <div style="font-size:18px;font-weight:500;margin-bottom:6px;color:#e8eaf0">Model uložený ✓</div>
    <div style="font-size:11px;color:#555a6a;margin-bottom:14px;font-family:monospace;word-break:break-all">${url}</div>
    <div style="background:#fff;padding:12px;border-radius:10px;display:inline-block;margin-bottom:14px"><img src="${qrCode}" style="width:180px;height:180px;display:block"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap">
      <a href="${qrCode}" download="qr-avra-${id}.png" style="background:#2ecc9a;color:#000;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;text-decoration:none">⬇ QR PNG</a>
      <a href="${url}" target="_blank" style="background:transparent;color:#2ecc9a;border:1px solid rgba(46,204,154,.4);border-radius:7px;padding:8px 16px;font-size:13px;text-decoration:none">↗ AR viewer</a>
    </div>
    <button onclick="this.closest('div[style]').remove()" style="background:transparent;border:1px solid rgba(255,255,255,.1);color:#8b90a0;border-radius:7px;padding:7px 18px;font-size:12px;cursor:pointer;font-family:inherit">Zavrieť</button>

// ── 3D Preview ────────────────────────────────────────────────────────────────
const pc=document.getElementById('pc');
const prev={renderer:null,scene:null,camera:null,group:null,theta:Math.PI/4};

function init3D(){
  const r=new THREE.WebGLRenderer({canvas:pc,antialias:true,alpha:true});
  r.setPixelRatio(Math.min(devicePixelRatio,2));
  r.setClearColor(0x080a10);
  r.shadowMap.enabled=true;
  const s=new THREE.Scene();
  s.background=new THREE.Color(0x080a10);
  s.add(new THREE.AmbientLight(0xffffff,.85));
  const sun=new THREE.DirectionalLight(0xfff8ee,1);
  sun.position.set(3,6,4);sun.castShadow=true;s.add(sun);
  const c=new THREE.PerspectiveCamera(55,1,0.001,100);
  const g=new THREE.Group();s.add(g);
  prev.renderer=r;prev.scene=s;prev.camera=c;prev.group=g;
  (function animate(){
    requestAnimationFrame(animate);
    prev.theta+=.004;
    const radius=1.5;
    c.position.set(Math.sin(prev.theta)*radius,1.0,Math.cos(prev.theta)*radius);
    c.lookAt(0,.04,0);
    const w=pc.clientWidth,h=pc.clientHeight;
    if(pc.width!==w||pc.height!==h){r.setSize(w,h,false);c.aspect=w/Math.max(1,h);c.updateProjectionMatrix();}
    r.render(s,c);
  })();
}

const FL3=[0xb8cce0,0xb0d4bc,0xddc89a,0xc8b8d8,0xc0d8e0];
const WL3=[0x2a3a5c,0x2a4a38,0x4a3a1a,0x3a2a4a,0x1a3040];

function update3D(){
  if(!prev.group)return;
  while(prev.group.children.length)prev.group.remove(prev.group.children[0]);
  const AR=0.05*0.035,WH=0.09,WT=0.006,FT=0.004;
  rooms.forEach((room,i)=>{
    if(!room.closed||room.pts.length<3)return;
    const ci=i%5;
    const xs=room.pts.map(p=>p.x),ys=room.pts.map(p=>p.y);
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const minY=Math.min(...ys),maxY=Math.max(...ys);
    const cx=(minX+maxX)/2*AR-(tc.width/2)*AR;
    const cz=(minY+maxY)/2*AR-(tc.height/2)*AR;
    const rw=Math.max(0.01,(maxX-minX)*AR);
    const rd=Math.max(0.01,(maxY-minY)*AR);
    const fl=new THREE.Mesh(new THREE.BoxGeometry(rw,FT,rd),new THREE.MeshLambertMaterial({color:FL3[ci]}));
    fl.position.set(cx,0,cz);fl.receiveShadow=true;prev.group.add(fl);
    [[rw,WH,WT,cx,WH/2,cz-rd/2],[rw,WH,WT,cx,WH/2,cz+rd/2],[WT,WH,rd,cx-rw/2,WH/2,cz],[WT,WH,rd,cx+rw/2,WH/2,cz]].forEach(([w,h,d,x,y,z])=>{
      const wm=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:WL3[ci]}));
      wm.position.set(x,y,z);wm.castShadow=true;prev.group.add(wm);
    });
  });
}

// ── Load existing property ─────────────────────────────────────────────────────
async function loadProperty(){
  if(!propId)return;
  try{
    const res=await fetch(`${API}/api/properties/${propId}`);
    if(!res.ok)return;
    const p=await res.json();
    document.getElementById('pname').value=p.name||'';
    document.getElementById('m-area').value=p.area||'';
    document.getElementById('m-price').value=p.price||'';
    setStatus(`Načítaná: ${p.name} · ${p.rooms?.length||0} miestností`);
  }catch(e){console.warn('Load error:',e.message);}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
resizeCanvas();
resetView();
init3D();
setTool('draw');
loadProperty();

<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVRA — Editor pôdorysu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --accent:#2ecc9a;--text:#e8eaf0;--text2:#8b90a0;--text3:#454a5a;
  --danger:#e05555;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

#topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.logo{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:12px;flex-shrink:0}
#prop-name-input{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:5px 10px;font-family:inherit;font-size:13px;width:180px;outline:none}
#prop-name-input:focus{border-color:var(--accent)}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.tb{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;font-size:12px;white-space:nowrap;transition:all .15s}
.tb:hover{background:var(--bg3);color:var(--text)}
.tb.active{background:rgba(46,204,154,.12);border-color:rgba(46,204,154,.4);color:var(--accent)}
.spacer{flex:1}
#save-btn{background:var(--accent);color:#000;border:none;border-radius:7px;padding:7px 16px;font-weight:600;font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap}
#save-btn:disabled{opacity:.5;cursor:not-allowed}

#main{display:grid;grid-template-columns:1fr 280px;flex:1;overflow:hidden}

#canvas-area{position:relative;overflow:hidden;background:#1a1e28}
#tc{width:100%;height:100%;display:block;cursor:crosshair}
#canvas-area.pan #tc{cursor:grab}
#canvas-area.panning #tc{cursor:grabbing}

#float-tools{position:absolute;left:10px;top:10px;display:flex;flex-direction:column;gap:5px}
.ft{width:34px;height:34px;border-radius:7px;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s;user-select:none}
.ft:hover{background:var(--bg3);color:var(--text)}
.ft.active{background:rgba(46,204,154,.15);border-color:rgba(46,204,154,.4);color:var(--accent)}

#zoom-label{position:absolute;bottom:10px;left:10px;font-size:11px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:3px 9px}
#instr{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--text2);background:rgba(13,15,20,.9);border:1px solid var(--border2);border-radius:99px;padding:5px 14px;white-space:nowrap;pointer-events:none}
#auto-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:8px 14px;display:none;align-items:center;gap:9px;font-size:12px;z-index:10}
.spin{width:13px;height:13px;border:2px solid rgba(46,204,154,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
#auto-result{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:9px;padding:8px 14px;font-size:12px;display:none;white-space:nowrap;z-index:10}

/* Panel */
#panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#preview-wrap{flex:0 0 200px;background:#080a10;position:relative}
#pc{width:100%;height:200px;display:block}
#preview-lbl{position:absolute;top:6px;left:8px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}

#scale-bar{padding:10px 12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
#scale-bar label{font-size:11px;color:var(--text3);white-space:nowrap}
#scale-input{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 8px;font-size:12px;width:70px;outline:none;font-family:inherit}
#scale-input:focus{border-color:var(--accent)}
#scale-unit{font-size:11px;color:var(--text3)}

#room-list{flex:1;overflow-y:auto;padding:10px}
.rl-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.rl-add{font-size:16px;cursor:pointer;color:var(--accent);line-height:1}
.ri{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;margin-bottom:2px;cursor:pointer;transition:background .15s}
.ri:hover{background:var(--bg3)}
.ri.sel{background:rgba(46,204,154,.1)}
.ri-col{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.ri-name{flex:1;min-width:0}
.ri-ninput{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:12px;width:100%;outline:none;padding:0}
.ri-ninput:focus{color:var(--accent)}
.ri-area{font-size:10px;color:var(--text3);white-space:nowrap}
.ri-del{width:20px;height:20px;border-radius:4px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ri-del:hover{background:rgba(224,85,85,.15);color:var(--danger)}

#panel-footer{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.mi{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:5px 9px;font-family:inherit;font-size:12px;outline:none;width:100%}
.mi:focus{border-color:var(--accent)}
.mlbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">A</div>
  <input id="prop-name-input" type="text" placeholder="Názov nehnuteľnosti…">
  <div class="sep"></div>
  <button class="tb active" id="tb-draw" onclick="setTool('draw')">✏ Kresliť</button>
  <button class="tb" id="tb-select" onclick="setTool('select')">↖ Vybrať</button>
  <button class="tb" id="tb-move" onclick="setTool('move')">✥ Presunúť</button>
  <button class="tb" id="tb-pan" onclick="setTool('pan')">✋ Pan</button>
  <div class="sep"></div>
  <button class="tb" onclick="uploadFloorPlan()">📐 Nahrať pôdorys</button>
  <button class="tb" id="tb-auto" onclick="autoDetect()">🔍 Auto-detekcia</button>
  <button class="tb" onclick="undoLast()">↩ Späť</button>
  <button class="tb" onclick="clearAll()">🗑 Vymazať</button>
  <div class="spacer"></div>
  <button id="save-btn" onclick="saveProperty()">💾 Uložiť & QR</button>
</div>

<div id="main">
  <div id="canvas-area">
    <canvas id="tc"></canvas>
    <div id="float-tools">
      <div class="ft" onclick="zoomIn()" title="+">+</div>
      <div class="ft" onclick="zoomOut()" title="−">−</div>
      <div class="ft" onclick="resetView()" title="Reset">⊙</div>
      <div class="ft" onclick="toggleGrid()" id="grid-btn" title="Mriežka" style="font-size:12px">⊞</div>
    </div>
    <div id="zoom-label">100%</div>
    <div id="instr">Kliknite pre bod • Enter / dvojklik pre uzavretie</div>
    <div id="auto-bar"><div class="spin"></div><span id="auto-msg">Analyzujem…</span></div>
    <div id="auto-result"></div>
  </div>

  <div id="panel">
    <div id="preview-wrap">
      <canvas id="pc"></canvas>
      <div id="preview-lbl">Live 3D</div>
    </div>

    <div id="scale-bar">
      <label>Mierka: 1px =</label>
      <input id="scale-input" type="number" value="5" min="1" max="100" step="1" onchange="update3D()">
      <span id="scale-unit">cm</span>
      <span style="font-size:10px;color:var(--text3);margin-left:4px">(pre výpočet m²)</span>
    </div>

    <div id="room-list">
      <div class="rl-title">
        Miestnosti
        <span class="rl-add" onclick="addEmptyRoom()" title="Pridať prázdnu miestnosť">+</span>
      </div>
      <div id="room-items"></div>
    </div>

    <div id="panel-footer">
      <div class="mrow">
        <div>
          <div class="mlbl">Rozloha m²</div>
          <input class="mi" id="meta-area" type="number" placeholder="78">
        </div>
        <div>
          <div class="mlbl">Cena €</div>
          <input class="mi" id="meta-price" type="text" placeholder="189 000">
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="floor-file" accept=".png,.jpg,.jpeg,.pdf" style="display:none" onchange="onFloorFile(this)">

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const BASE = location.origin;

function getPropId(){
  const parts = location.pathname.split('/').filter(Boolean);
  return (parts.length >= 2 && parts[0] === 'editor') ? parts[1] : null;
}
let propId = getPropId();

// ── State ─────────────────────────────────────────────────────────────────────
let tool = 'draw';
let rooms = [];
let currentPts = [];
let selectedRoom = null;
let movingRoom = null, moveOffX = 0, moveOffZ = 0;
let bgImage = null;
let showGrid = true;
let roomCounter = 0;

let viewX = 0, viewY = 0, viewScale = 1;
let isPanning = false, panSX = 0, panSY = 0, panVX = 0, panVY = 0;
let mouseX = 0, mouseY = 0;

const NAMES = ['Obývacia izba','Kuchyňa','Spálňa','Detská izba','Kúpeľňa','Chodba','Pracovňa','Jedáleň','WC','Šatník','Terasa','Balkón'];
const COLORS = ['#5b9bd5','#4caf7d','#e0a835','#a07dd0','#2ecc9a','#e05555','#f5a623','#9bd55b','#d55b9b','#5bd5c8','#d5955b','#955bd5'];

function mkRoom(pts=[]){
  const r={
    id: Date.now()+'_'+(Math.random()*1e6|0),
    name: NAMES[roomCounter % NAMES.length],
    color: COLORS[roomCounter % COLORS.length],
    points: pts,
    closed: pts.length >= 3,
  };
  roomCounter++;
  return r;
}

// ── Canvas ────────────────────────────────────────────────────────────────────
const tc = document.getElementById('tc');
const ctx = tc.getContext('2d');

function resizeCanvas(){
  const a = document.getElementById('canvas-area');
  tc.width = a.clientWidth; tc.height = a.clientHeight;
  draw();
}
addEventListener('resize', resizeCanvas);

const W2S = (x,y) => ({x: x*viewScale+viewX, y: y*viewScale+viewY});
const S2W = (x,y) => ({x: (x-viewX)/viewScale, y: (y-viewY)/viewScale});
const snap = v => Math.round(v/10)*10;

function draw(){
  ctx.clearRect(0,0,tc.width,tc.height);
  if(showGrid) drawGrid();
  if(bgImage){
    ctx.globalAlpha=0.4;
    ctx.drawImage(bgImage, viewX, viewY, bgImage.width*viewScale, bgImage.height*viewScale);
    ctx.globalAlpha=1;
  }
  rooms.forEach(r=>drawRoom(r));
  if(currentPts.length && tool==='draw') drawCurrent();
  document.getElementById('zoom-label').textContent = Math.round(viewScale*100)+'%';
}

function drawGrid(){
  const gs = 50*viewScale;
  if(gs < 6) return;
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=0.5;
  ctx.beginPath();
  for(let x=((viewX%gs)+gs)%gs; x<tc.width; x+=gs){ ctx.moveTo(x,0); ctx.lineTo(x,tc.height); }
  for(let y=((viewY%gs)+gs)%gs; y<tc.height; y+=gs){ ctx.moveTo(0,y); ctx.lineTo(tc.width,y); }
  ctx.stroke();
}

function drawRoom(r, highlight=false){
  if(!r.points.length) return;
  const pts = r.points.map(p=>W2S(p.x,p.y));
  const isSel = r===selectedRoom;

  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  if(r.closed) ctx.closePath();

  if(r.closed){
    ctx.fillStyle = r.color+'30';
    ctx.fill();
  }
  ctx.strokeStyle = isSel ? r.color : r.color+'99';
  ctx.lineWidth = isSel ? 2.5 : 1.5;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.stroke();

  // Points
  pts.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y, isSel?5:3.5, 0,Math.PI*2);
    ctx.fillStyle = i===0 ? '#2ecc9a' : r.color;
    ctx.fill();
    if(isSel){ ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke(); }
  });

  // Label + area
  if(r.closed && pts.length >= 3){
    const cx = pts.reduce((s,p)=>s+p.x,0)/pts.length;
    const cy = pts.reduce((s,p)=>s+p.y,0)/pts.length;
    const fs = Math.max(10, Math.min(14, 12*viewScale));
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`500 ${fs}px system-ui`;
    ctx.fillStyle=r.color;
    ctx.fillText(r.name, cx, cy-fs*0.7);
    const a = calcAreaM2(r.points);
    if(a>0){
      ctx.font=`${fs*0.85}px system-ui`;
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText(a.toFixed(1)+' m²', cx, cy+fs*0.5);
    }
  }
}

function drawCurrent(){
  if(!currentPts.length) return;
  const pts = currentPts.map(p=>W2S(p.x,p.y));
  ctx.strokeStyle='#2ecc9a'; ctx.lineWidth=1.5;
  ctx.setLineDash([5,4]);
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(mouseX,mouseY);
  ctx.stroke(); ctx.setLineDash([]);

  pts.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y, i===0?6:4, 0,Math.PI*2);
    ctx.fillStyle = i===0?'#2ecc9a':'#2ecc9a88';
    ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
  });

  // Snap ring
  if(currentPts.length >= 3){
    const f=W2S(currentPts[0].x,currentPts[0].y);
    if(Math.hypot(mouseX-f.x,mouseY-f.y)<22){
      ctx.beginPath(); ctx.arc(f.x,f.y,14,0,Math.PI*2);
      ctx.strokeStyle='#2ecc9a'; ctx.lineWidth=2;
      ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    }
  }
}

// ── Area calculation ──────────────────────────────────────────────────────────
function calcAreaM2(pts){
  if(pts.length < 3) return 0;
  let a=0;
  for(let i=0;i<pts.length;i++){
    const j=(i+1)%pts.length;
    a += pts[i].x*pts[j].y - pts[j].x*pts[i].y;
  }
  const pxArea = Math.abs(a)/2;
  const pxPerM = 100 / (parseFloat(document.getElementById('scale-input').value)||5) * 100;
  return pxArea / (pxPerM*pxPerM);
}

// ── Events ────────────────────────────────────────────────────────────────────
tc.addEventListener('mousemove',e=>{
  const r=tc.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
  if(isPanning){ viewX=panVX+(e.clientX-panSX); viewY=panVY+(e.clientY-panSY); }
  if(movingRoom){
    const wp=S2W(mouseX,mouseY);
    movingRoom.points=movingRoom.points.map(p=>({x:p.x+(wp.x-moveOffX), y:p.y+(wp.y-moveOffZ)}));
    moveOffX=wp.x; moveOffZ=wp.y;
    renderRoomList(); update3D();
  }
  draw();
});

tc.addEventListener('mousedown',e=>{
  const r=tc.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;

  if(tool==='pan'||e.button===1){
    isPanning=true; panSX=e.clientX; panSY=e.clientY; panVX=viewX; panVY=viewY;
    document.getElementById('canvas-area').classList.add('panning'); return;
  }
  if(e.button!==0) return;

  if(tool==='draw'){
    const wp=S2W(mouseX,mouseY);
    if(currentPts.length>=3){
      const f=W2S(currentPts[0].x,currentPts[0].y);
      if(Math.hypot(mouseX-f.x,mouseY-f.y)<22){ closeRoom(); return; }
    }
    currentPts.push({x:snap(wp.x),y:snap(wp.y)});
    draw();
  }
  else if(tool==='select'){
    const wp=S2W(mouseX,mouseY);
    selectedRoom=rooms.find(r=>r.closed&&ptInPoly(wp,r.points))||null;
    renderRoomList(); draw();
  }
  else if(tool==='move'){
    const wp=S2W(mouseX,mouseY);
    movingRoom=rooms.find(r=>r.closed&&ptInPoly(wp,r.points))||null;
    if(movingRoom){ moveOffX=wp.x; moveOffZ=wp.y; selectedRoom=movingRoom; renderRoomList(); }
  }
});

tc.addEventListener('mouseup',()=>{
  isPanning=false; movingRoom=null;
  document.getElementById('canvas-area').classList.remove('panning','pan');
});
tc.addEventListener('dblclick',()=>{ if(tool==='draw'&&currentPts.length>=3) closeRoom(); });
tc.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?.88:1.14;
  const r=tc.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  viewX=mx-(mx-viewX)*f; viewY=my-(my-viewY)*f;
  viewScale=Math.max(0.08,Math.min(12,viewScale*f));
  draw();
},{passive:false});

// Touch
let tStart=null,tPanVX=0,tPanVY=0,tLastDist=null;
tc.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=tc.getBoundingClientRect();
  if(e.touches.length===1){
    const t=e.touches[0];
    mouseX=t.clientX-r.left; mouseY=t.clientY-r.top;
    tStart={x:mouseX,y:mouseY}; tPanVX=viewX; tPanVY=viewY;
  }
  if(e.touches.length===2){
    tLastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});

tc.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=tc.getBoundingClientRect();
  if(e.touches.length===1){
    const t=e.touches[0];
    mouseX=t.clientX-r.left; mouseY=t.clientY-r.top;
    if(tool==='pan'){ viewX=tPanVX+(mouseX-tStart.x); viewY=tPanVY+(mouseY-tStart.y); }
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(tLastDist){
      const f=d/tLastDist,cx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
      viewX=cx-(cx-viewX)*f; viewY=cy-(cy-viewY)*f;
      viewScale=Math.max(0.08,Math.min(12,viewScale*f));
    }
    tLastDist=d;
  }
  draw();
},{passive:false});

tc.addEventListener('touchend',e=>{
  e.preventDefault(); tLastDist=null;
  if(tool==='draw'&&e.changedTouches.length===1){
    if(currentPts.length>=3){
      const f=W2S(currentPts[0].x,currentPts[0].y);
      if(Math.hypot(mouseX-f.x,mouseY-f.y)<22){ closeRoom(); return; }
    }
    const wp=S2W(mouseX,mouseY);
    currentPts.push({x:snap(wp.x),y:snap(wp.y)});
    draw();
  }
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&currentPts.length>=3) closeRoom();
  if(e.key==='Escape'){ currentPts=[]; draw(); }
  if((e.ctrlKey||e.metaKey)&&e.key==='z') undoLast();
  if(e.key==='Delete'&&selectedRoom){ deleteRoom(selectedRoom); }
});

// ── Room ops ──────────────────────────────────────────────────────────────────
function closeRoom(){
  if(currentPts.length<3) return;
  const r=mkRoom([...currentPts]);
  rooms.push(r); currentPts=[]; selectedRoom=r;
  renderRoomList(); update3D(); draw();
}

function ptInPoly(pt,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if((yi>pt.y)!==(yj>pt.y)&&pt.x<(xj-xi)*(pt.y-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function addEmptyRoom(){
  const r=mkRoom([{x:-50,y:-50},{x:50,y:-50},{x:50,y:50},{x:-50,y:50}]);
  r.closed=true; rooms.push(r); selectedRoom=r;
  renderRoomList(); update3D(); draw();
}
window.addEmptyRoom=addEmptyRoom;

function deleteRoom(r){
  rooms=rooms.filter(x=>x!==r);
  if(selectedRoom===r) selectedRoom=null;
  renderRoomList(); update3D(); draw();
}

function renderRoomList(){
  const el=document.getElementById('room-items');
  if(!rooms.length){ el.innerHTML='<div style="font-size:11px;color:var(--text3);padding:4px 0">Nakreslite miestnosti na plátne</div>'; return; }
  el.innerHTML=rooms.map((r,i)=>`
    <div class="ri ${r===selectedRoom?'sel':''}" onclick="selectRoom(${i})">
      <div class="ri-col" style="background:${r.color}"></div>
      <div class="ri-name">
        <input class="ri-ninput" value="${r.name}"
          onclick="event.stopPropagation()"
          onchange="rooms[${i}].name=this.value;draw();update3D()">
      </div>
      <div class="ri-area">${calcAreaM2(r.points).toFixed(1)}m²</div>
      <button class="ri-del" onclick="deleteRoom(rooms[${i}]);event.stopPropagation()">✕</button>
    </div>`).join('');
}

function selectRoom(i){
  selectedRoom=rooms[i]; renderRoomList(); draw();
}
window.selectRoom=selectRoom;

// ── Tools ─────────────────────────────────────────────────────────────────────
function setTool(t){
  tool=t; currentPts=[]; movingRoom=null;
  ['draw','select','move','pan'].forEach(x=>{
    const b=document.getElementById('tb-'+x);
    if(b) b.classList.toggle('active',x===t);
  });
  const ca=document.getElementById('canvas-area');
  ca.classList.toggle('pan',t==='pan');
  const hints={draw:'Kliknite pre bod • Enter/dvojklik pre uzavretie miestnosti',select:'Kliknite na miestnosť • Delete pre zmazanie',move:'Ťahajte miestnosť na nové miesto',pan:'Ťahajte pre posúvanie • Scroll pre zoom'};
  document.getElementById('instr').textContent=hints[t]||'';
  draw();
}
window.setTool=setTool;

function zoomIn(){ viewScale=Math.min(12,viewScale*1.25); draw(); }
function zoomOut(){ viewScale=Math.max(0.08,viewScale/1.25); draw(); }
function resetView(){ viewX=tc.width/2; viewY=tc.height/2; viewScale=1; draw(); }
function toggleGrid(){ showGrid=!showGrid; document.getElementById('grid-btn').classList.toggle('active',showGrid); draw(); }
function undoLast(){
  if(currentPts.length){ currentPts.pop(); draw(); }
  else if(rooms.length){ rooms.pop(); renderRoomList(); update3D(); draw(); }
}
window.zoomIn=zoomIn; window.zoomOut=zoomOut; window.resetView=resetView;
window.toggleGrid=toggleGrid; window.undoLast=undoLast;
window.clearAll=()=>{ if(!confirm('Vymazať všetky miestnosti?'))return; rooms=[]; roomCounter=0; currentPts=[]; selectedRoom=null; renderRoomList(); update3D(); draw(); };
window.uploadFloorPlan=()=>document.getElementById('floor-file').click();

// ── Floor plan upload ─────────────────────────────────────────────────────────
function onFloorFile(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      bgImage=img;
      // Fit to canvas
      const sx=tc.width*.85/img.width, sy=tc.height*.85/img.height;
      viewScale=Math.min(sx,sy);
      viewX=(tc.width-img.width*viewScale)/2;
      viewY=(tc.height-img.height*viewScale)/2;
      draw();
      // Auto-detect after upload
      autoDetectFile(file);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
window.onFloorFile=onFloorFile;

// ── Auto-detection ────────────────────────────────────────────────────────────
async function autoDetect(){
  if(!bgImage){ alert('Najprv nahrajte pôdorys (📐 Nahrať pôdorys)'); return; }
  const canvas2=document.createElement('canvas');
  canvas2.width=bgImage.width; canvas2.height=bgImage.height;
  canvas2.getContext('2d').drawImage(bgImage,0,0);
  canvas2.toBlob(blob=>autoDetectBlob(blob,'floorplan.png'),'image/png');
}
window.autoDetect=autoDetect;

async function autoDetectFile(file){
  // For PDF files, skip auto-detect (can't parse directly in browser)
  if(file.name.endsWith('.pdf')){
    showAutoResult('PDF nahrané ako pozadie. Nakresli miestnosti manuálne alebo použi PNG/JPG pre auto-detekciu.',false);
    return;
  }
  autoDetectBlob(file, file.name);
}

async function autoDetectBlob(blob, filename){
  showAutoBar('Analyzujem pôdorys…');
  try{
    const fd=new FormData();
    fd.append('image',blob,filename);
    const res=await fetch(BASE+'/api/parse-floorplan',{method:'POST',body:fd});
    const data=await res.json();
    hideAutoBar();

    if(data.rooms&&data.rooms.length>=2){
      applyAutoRooms(data.rooms);
      showAutoResult(`✓ Detekovaných ${data.rooms.length} miestností — skontrolujte a dolaďte`,true);
    }else{
      showAutoResult(data.message||'Auto-detekcia nenašla miestnosti. Nakresli ich manuálne.',false);
    }
  }catch(e){
    hideAutoBar();
    showAutoResult('Chyba komunikácie so serverom: '+e.message,false);
  }
}

function applyAutoRooms(serverRooms){
  // Server rooms are in AR coords (meters * 0.035 scale)
  // Convert back to canvas pixels
  // AR: x,z in range ~[-0.35, 0.35], w,d ~[0.03, 0.25]
  // Canvas: we want rooms centered around 0,0 at current viewScale
  const REAL_M=20.0, AR=0.035;
  const canvasPxPerM = 100; // 100px = 1m at scale=1 (with 1px=1cm default)

  rooms=serverRooms.map((r,i)=>{
    const cx=r.x/AR*canvasPxPerM;
    const cz=r.z/AR*canvasPxPerM;
    const hw=r.w/AR*canvasPxPerM/2;
    const hd=r.d/AR*canvasPxPerM/2;
    const room=mkRoom([
      {x:cx-hw,y:cz-hd},{x:cx+hw,y:cz-hd},
      {x:cx+hw,y:cz+hd},{x:cx-hw,y:cz+hd}
    ]);
    room.name=r.name||NAMES[i%NAMES.length];
    room.closed=true;
    return room;
  });
  roomCounter=rooms.length;
  renderRoomList(); update3D(); draw();
  // Reset view to show rooms
  resetView();
}

function showAutoBar(msg){ document.getElementById('auto-msg').textContent=msg; document.getElementById('auto-bar').style.display='flex'; }
function hideAutoBar(){ document.getElementById('auto-bar').style.display='none'; }
function showAutoResult(msg,ok){
  const el=document.getElementById('auto-result');
  el.textContent=msg; el.style.display='block';
  el.style.color=ok?'var(--accent)':'var(--warn)';
  setTimeout(()=>el.style.display='none',5000);
}

// ── Convert rooms → AR format for server ──────────────────────────────────────
function roomsToAR(){
  const scale=parseFloat(document.getElementById('scale-input').value)||5; // cm per px
  const mPerPx=scale/100; // meters per pixel
  const AR=0.035; // AR scale factor
  const REAL_M=20.0;

  return rooms.filter(r=>r.closed&&r.points.length>=3).map(r=>{
    const xs=r.points.map(p=>p.x), ys=r.points.map(p=>p.y);
    const minX=Math.min(...xs),maxX=Math.max(...xs);
    const minY=Math.min(...ys),maxY=Math.max(...ys);
    const wPx=maxX-minX, dPx=maxY-minY;
    const cxPx=(minX+maxX)/2, czPx=(minY+maxY)/2;

    // Convert to AR coordinates
    const w=wPx*mPerPx*AR;
    const d=dPx*mPerPx*AR;
    const x=cxPx*mPerPx*AR;
    const z=czPx*mPerPx*AR;

    return{
      name:r.name, label:'R'+(rooms.indexOf(r)+1),
      x:+x.toFixed(4), z:+z.toFixed(4),
      w:+Math.max(0.02,w).toFixed(4),
      d:+Math.max(0.02,d).toFixed(4),
      area:+calcAreaM2(r.points).toFixed(1)
    };
  });
}

// ── 3D Preview ────────────────────────────────────────────────────────────────
const pc=document.getElementById('pc');
const prev={renderer:null,scene:null,camera:null,group:null,theta:Math.PI/4};

function init3D(){
  const renderer=new THREE.WebGLRenderer({canvas:pc,antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x080a10);
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x080a10);
  scene.add(new THREE.AmbientLight(0xffffff,0.85));
  const sun=new THREE.DirectionalLight(0xfff8ee,1.1);
  sun.position.set(3,6,4); scene.add(sun);
  const camera=new THREE.PerspectiveCamera(55,1,0.001,100);
  const group=new THREE.Group(); scene.add(group);
  prev.renderer=renderer; prev.scene=scene; prev.camera=camera; prev.group=group;

  function loop(){
    requestAnimationFrame(loop);
    prev.theta+=0.006;
    const r=1.6;
    camera.position.set(Math.sin(prev.theta)*r,1.1,Math.cos(prev.theta)*r);
    camera.lookAt(0,0.04,0);
    const w=pc.clientWidth,h=pc.clientHeight||200;
    if(pc.width!==w||pc.height!==h){ renderer.setSize(w,h,false); camera.aspect=w/Math.max(1,h); camera.updateProjectionMatrix(); }
    renderer.render(scene,camera);
  }
  loop();
}

const FLOORS3=[0xb8cce0,0xb0d4bc,0xddc89a,0xc8b8d8,0xc0d8e0];
const WALLS3=[0x2a3a5c,0x2a4a38,0x4a3a1a,0x3a2a4a,0x1a3040];

function update3D(){
  if(!prev.group) return;
  while(prev.group.children.length) prev.group.remove(prev.group.children[0]);

  const arRooms=roomsToAR();
  const WH=0.09,WT=0.006,FT=0.004;

  arRooms.forEach((r,i)=>{
    const ci=i%5,{x,z,w,d}=r;
    const fm=new THREE.MeshLambertMaterial({color:FLOORS3[ci]});
    const wm=new THREE.MeshLambertMaterial({color:WALLS3[ci]});
    const floor=new THREE.Mesh(new THREE.BoxGeometry(w,FT,d),fm);
    floor.position.set(x,0,z); prev.group.add(floor);
    [[w,WH,WT,x,WH/2,z-d/2],[w,WH,WT,x,WH/2,z+d/2],[WT,WH,d,x-w/2,WH/2,z],[WT,WH,d,x+w/2,WH/2,z]].forEach(([sw,sh,sd,px,py,pz])=>{
      const wall=new THREE.Mesh(new THREE.BoxGeometry(sw,sh,sd),wm);
      wall.position.set(px,py,pz); prev.group.add(wall);
    });
  });
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveProperty(){
  const name=document.getElementById('prop-name-input').value.trim();
  if(!name){ alert('Zadajte názov nehnuteľnosti'); return; }
  const arRooms=roomsToAR();
  if(!arRooms.length){ alert('Nakreslite aspoň jednu uzavretú miestnosť (Enter pre uzavretie)'); return; }

  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Ukladám…';

  try{
    let data;
    if(propId){
      // Update existing property
      const res=await fetch(BASE+'/api/properties/'+propId,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          name,
          area:document.getElementById('meta-area').value||'',
          price:document.getElementById('meta-price').value||'',
          rooms:arRooms,
          source:'trace'
        })
      });
      if(!res.ok){ const e=await res.json(); throw new Error(e.error||'HTTP '+res.status); }
      data=await res.json();
    }else{
      // Create new property
      const fd=new FormData();
      fd.append('name',name);
      fd.append('area',document.getElementById('meta-area').value||'');
      fd.append('price',document.getElementById('meta-price').value||'');
      fd.append('rooms',JSON.stringify(arRooms));
      fd.append('source','trace');
      const res=await fetch(BASE+'/api/properties',{method:'POST',body:fd});
      if(!res.ok){ const e=await res.json(); throw new Error(e.error||'HTTP '+res.status); }
      data=await res.json();
      propId=data.id;
      history.replaceState(null,'','/editor/'+propId);
    }

    btn.textContent='✓ Uložené!';
    setTimeout(()=>{ btn.disabled=false; btn.textContent='💾 Uložiť & QR'; },2500);

    if(data.qrCode||data.id){
      showQR(data.qrCode,data.viewerUrl||data.viewer_url||(BASE+'/view/'+(data.id||propId)),data.id||propId);
    }
  }catch(e){
    console.error('Save error:',e);
    alert('Chyba pri ukladaní: '+e.message);
    btn.disabled=false; btn.textContent='💾 Uložiť & QR';
  }
}
window.saveProperty=saveProperty;

function showQR(qrCode,url,id){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  d.innerHTML=`<div style="background:#13161e;border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:26px;max-width:340px;width:100%;text-align:center">
    <div style="font-size:17px;font-weight:500;color:#e8eaf0;margin-bottom:6px">QR kód pripravený</div>
    <div style="font-size:11px;color:#8b90a0;margin-bottom:14px;word-break:break-all">${url}</div>
    ${qrCode?`<div style="background:#fff;padding:12px;border-radius:10px;display:inline-block;margin-bottom:14px"><img src="${qrCode}" style="width:180px;height:180px;display:block"></div>`:''}
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px">
      ${qrCode?`<a href="${qrCode}" download="qr-${id}.png" style="background:#2ecc9a;color:#000;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;text-decoration:none">⬇ PNG</a>`:''}
      <a href="/view/${id}" target="_blank" style="background:transparent;color:#2ecc9a;border:1px solid rgba(46,204,154,.4);border-radius:8px;padding:8px 16px;font-size:13px;text-decoration:none">↗ Otvoriť AR</a>
      <button onclick="navigator.clipboard.writeText('${url}').then(()=>alert('URL skopírovaná'))" style="background:transparent;color:#8b90a0;border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit">⊙ Kopírovať</button>
    </div>
    <button onclick="this.closest('[style*=fixed]').remove()" style="background:transparent;border:1px solid rgba(255,255,255,.14);color:#8b90a0;border-radius:8px;padding:7px 20px;font-size:12px;cursor:pointer;font-family:inherit">Zavrieť</button>
  </div>`;
  document.body.appendChild(d);
}

// ── Load existing property ─────────────────────────────────────────────────────
async function loadProperty(){
  if(!propId) return;
  try{
    const res=await fetch(BASE+'/api/properties/'+propId);
    if(!res.ok) return;
    const p=await res.json();
    document.getElementById('prop-name-input').value=p.name||'';
    document.getElementById('meta-area').value=p.area||'';
    document.getElementById('meta-price').value=p.price||'';
    // Note: we don't load rooms back to canvas (AR coords → canvas is complex)
    // Instead show info that property exists
    if(p.rooms&&p.rooms.length>0){
      showAutoResult(`Nehnuteľnosť načítaná: ${p.name} (${p.rooms.length} miestností). Nakresli nový pôdorys alebo ulož existujúci.`,true);
    }
  }catch(e){ console.warn('Load property error:',e.message); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
resizeCanvas();
init3D();
resetView();
setTool('draw');
renderRoomList();
loadProperty();
</script>

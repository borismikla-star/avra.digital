<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AVRA — AR Prehliadka</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080a10;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;height:100vh;overflow:hidden;color:#fff}

#splash{position:fixed;inset:0;background:#080a10;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.sp-mark{width:64px;height:64px;background:#2ecc9a;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#000}
.sp-title{font-size:22px;font-weight:500}
.sp-meta{font-size:14px;color:rgba(255,255,255,.45);max-width:260px;line-height:1.6}
.sp-btn{background:#2ecc9a;color:#000;border:none;border-radius:99px;padding:16px 44px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;width:100%;max-width:280px;animation:glow 2s ease-out infinite}
@keyframes glow{0%{box-shadow:0 0 0 0 rgba(46,204,154,.5)}70%{box-shadow:0 0 0 18px rgba(46,204,154,0)}100%{box-shadow:0 0 0 0 rgba(46,204,154,0)}}
.sp-skip{font-size:13px;color:rgba(255,255,255,.3);cursor:pointer;text-decoration:underline}
.sp-loading{font-size:12px;color:rgba(255,255,255,.3)}

#viewer-wrap{position:fixed;inset:0;display:none;flex-direction:column}

model-viewer{
  width:100%;flex:1;
  --poster-color:#080a10;
  background:#080a10;
}

#hud{position:absolute;top:0;left:0;right:0;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);padding:14px 16px 40px;pointer-events:none}
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(46,204,154,.15);border:1px solid rgba(46,204,154,.3);color:#2ecc9a;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:99px;margin-bottom:6px}
.bdot{width:5px;height:5px;background:#2ecc9a;border-radius:50%;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#pname{font-size:19px;font-weight:500}
#pmeta{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}

#bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:16px;display:flex;gap:10px;justify-content:center;background:linear-gradient(to top,rgba(0,0,0,.6),transparent)}

.ar-btn{
  background:#2ecc9a;color:#000;border:none;border-radius:99px;
  padding:13px 28px;font-size:14px;font-weight:600;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:8px;
}
.ar-btn svg{width:18px;height:18px}
.ar-btn:disabled{opacity:.4;cursor:not-allowed}

.ctrl-btn{
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:99px;
  padding:13px 20px;font-size:13px;font-family:inherit;cursor:pointer;
}

#ar-hint{
  position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.12);border-radius:99px;
  padding:8px 18px;font-size:12px;white-space:nowrap;
  opacity:0;transition:opacity .4s;pointer-events:none;
}

#mm{position:absolute;top:80px;right:12px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);border-radius:10px;overflow:hidden}
#mmc{width:100px;display:block}
#mmlbl{font-size:9px;color:rgba(255,255,255,.35);text-align:center;padding:3px 0}

#no-model{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:13px;text-align:center;padding:32px;pointer-events:none}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-mark">A</div>
  <div class="sp-title" id="sp-title">AVRA Digital</div>
  <div class="sp-meta" id="sp-meta">Načítavam…</div>
  <button class="sp-btn" id="sp-btn" onclick="startViewer()" style="display:none">
    Otvoriť AR prehliadku
  </button>
  <div class="sp-loading" id="sp-loading">Načítavam model…</div>
  <div class="sp-skip" id="sp-skip" onclick="startViewer()" style="display:none">Pokračovať bez AR</div>
</div>

<div id="viewer-wrap">
  <model-viewer
    id="mv"
    camera-controls
    touch-action="pan-y"
    auto-rotate
    auto-rotate-delay="3000"
    rotation-per-second="20deg"
    shadow-intensity="1"
    shadow-softness="0.8"
    environment-image="neutral"
    exposure="1"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    alt="3D model bytu"
  >
    <div id="no-model" slot="poster">Pripravujem 3D model…</div>
    <button slot="ar-button" class="ar-btn" id="ar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      Zobraziť v AR
    </button>
  </model-viewer>

  <div id="hud">
    <div class="badge"><div class="bdot"></div>AVRA AR</div>
    <div id="pname"></div>
    <div id="pmeta"></div>
  </div>

  <div id="ar-hint">Klepnite na "Zobraziť v AR" pre AR prehliadku</div>

  <div id="mm"><canvas id="mmc"></canvas><div id="mmlbl"></div></div>

  <div id="bottom-bar">
    <button class="ctrl-btn" onclick="mv.resetTurntableRotation()">⟳ Reset</button>
    <button class="ctrl-btn" onclick="toggleAutoRotate()">⏸ Auto</button>
  </div>
</div>

<script>
const propId = new URLSearchParams(location.search).get('id');
const mv = document.getElementById('mv');
let autoRotating = true;
let property = null;
let rooms = [];

function defaultRooms(){
  return [
    {name:'Obývacia izba',label:'R1',x:-0.105,z:-0.07, w:0.245,d:0.21, area:28},
    {name:'Kuchyňa',      label:'R2',x:0.1575,z:-0.07, w:0.14, d:0.21, area:14},
    {name:'Spálňa',       label:'R3',x:-0.105,z:0.1925,w:0.21, d:0.175,area:16},
    {name:'Detská izba',  label:'R4',x:0.14,  z:0.1925,w:0.175,d:0.175,area:12},
    {name:'Kúpeľňa',      label:'R5',x:0.07,  z:0.105, w:0.105,d:0.105,area:7 },
  ];
}

async function loadProperty(){
  if(!propId){ setFallback(); return; }
  try{
    const res=await fetch('/api/properties/'+propId);
    if(!res.ok) throw new Error('HTTP '+res.status);
    property=await res.json();
    rooms=property.rooms&&property.rooms.length?property.rooms:defaultRooms();

    document.getElementById('sp-title').textContent=property.name||'AR Prehliadka';
    document.getElementById('pname').textContent=property.name||'';
    const meta=[property.area?property.area+' m²':'',property.price||''].filter(Boolean).join(' · ');
    document.getElementById('sp-meta').textContent=meta||'3D model nehnuteľnosti';
    document.getElementById('pmeta').textContent=meta;

    // Load GLB if available
    const glbUrl=property.glb_url||property.glbUrl;
    if(glbUrl){
      console.log('Loading GLB:',glbUrl);
      mv.src=glbUrl;
      document.getElementById('sp-loading').textContent='Model pripravený ✓';
    } else {
      // Fallback: generate inline 3D from rooms data using Three.js
      document.getElementById('sp-loading').textContent='Generujem model…';
      await loadFallbackViewer();
    }
  }catch(e){
    console.error('Load error:',e);
    setFallback();
  }
  buildMinimap();
  showSplashBtn();
}

function setFallback(){
  rooms=defaultRooms();
  document.getElementById('sp-title').textContent='AVRA Demo';
  document.getElementById('sp-meta').textContent='Vzorová AR prehliadka';
  document.getElementById('pname').textContent='AVRA Demo';
  document.getElementById('pmeta').textContent='Vzorový byt';
  document.getElementById('sp-loading').textContent='Demo model';
  loadFallbackViewer();
}

// Fallback: show Three.js viewer when no GLB available
async function loadFallbackViewer(){
  mv.removeAttribute('src');
  mv.style.display='none';
  document.getElementById('no-model').style.pointerEvents='auto';
  document.getElementById('no-model').innerHTML='<div style="max-width:240px"><div style="font-size:32px;margin-bottom:8px">📐</div>Pôdorys sa spracúva.<br>Skúste znova o chvíľu.</div>';
}

function showSplashBtn(){
  document.getElementById('sp-btn').style.display='block';
  document.getElementById('sp-skip').style.display='block';
  document.getElementById('sp-loading').style.display='none';
}

function startViewer(){
  document.getElementById('splash').style.display='none';
  document.getElementById('viewer-wrap').style.display='flex';

  // Show AR hint after 2s
  setTimeout(()=>{
    const hint=document.getElementById('ar-hint');
    hint.style.opacity='1';
    setTimeout(()=>hint.style.opacity='0',4000);
  },2000);
}
window.startViewer=startViewer;

function toggleAutoRotate(){
  autoRotating=!autoRotating;
  mv.autoRotate=autoRotating;
}

// model-viewer events
mv.addEventListener('load',()=>{
  console.log('Model loaded');
  document.getElementById('sp-loading').textContent='Model pripravený ✓';
  showSplashBtn();
});

mv.addEventListener('error',(e)=>{
  console.error('Model error:',e);
  loadFallbackViewer();
  showSplashBtn();
});

mv.addEventListener('ar-status',(e)=>{
  console.log('AR status:',e.detail.status);
});

// Minimap
function buildMinimap(){
  const mc=document.getElementById('mmc'),MS=100;
  mc.width=mc.height=MS;
  const ctx=mc.getContext('2d');
  ctx.fillStyle='#080a10';ctx.fillRect(0,0,MS,MS);
  if(!rooms.length)return;
  let x0=Infinity,x1=-Infinity,z0=Infinity,z1=-Infinity;
  rooms.forEach(r=>{x0=Math.min(x0,r.x-r.w/2);x1=Math.max(x1,r.x+r.w/2);z0=Math.min(z0,r.z-r.d/2);z1=Math.max(z1,r.z+r.d/2);});
  const pad=8,sc=Math.min((MS-pad*2)/(x1-x0||1),(MS-pad*2)/(z1-z0||1));
  const cols=['#5b9bd5','#4caf7d','#e0a835','#a07dd0','#2ecc9a'];
  rooms.forEach((r,i)=>{
    ctx.fillStyle=cols[i%5]+'55';ctx.strokeStyle=cols[i%5];ctx.lineWidth=0.8;
    const px=pad+(r.x-r.w/2-x0)*sc,pz=pad+(r.z-r.d/2-z0)*sc;
    ctx.fillRect(px,pz,r.w*sc,r.d*sc);ctx.strokeRect(px,pz,r.w*sc,r.d*sc);
  });
  document.getElementById('mmlbl').textContent=rooms.length+' miestností';
}

// Boot
loadProperty();
</script>
</body>
</html>
